[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"

[[plugin.prepend_previewers]]
mime = "application/{,g}zip"
run = "lsar"

[[plugin.prepend_previewers]]
mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}"
run = "lsar"

[[plugin.prepend_fetchers]]
id = "mactag"
name = "*"
run = "mactag"

[[plugin.prepend_fetchers]]
id = "mactag"
name = "*/"
run = "mactag"

[[plugin.prepend_previewers]]
mime = "image/*"
run = "chafa --symbols=vhal --fill=blocks --fg-only --colors=256 --size=!!:40 \"$@\""

[opener]
edit = [{ run = 'nvim "$@"', block = true, for = "unix" }]

[manager]
linemode = "git"
