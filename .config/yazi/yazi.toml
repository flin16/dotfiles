[[plugin.prepend_fetchers]]
group = "git"
id = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
group = "git"
id = "git"
url = "*/"
run = "git"

[[plugin.prepend_previewers]]
mime = "application/{,g}zip"
run = "lsar"

[[plugin.prepend_previewers]]
mime = "application/x-{tar,bzip*,7z-compressed,xz,rar}"
run = "lsar"

[[plugin.prepend_fetchers]]
group = "mactag"
id = "mactag"
url = "*"
run = "mactag"

[[plugin.prepend_fetchers]]
group = "mactag"
id = "mactag"
url = "*/"
run = "mactag"

[preview]
image = true

[opener]
edit = [{ run = 'nvim "$@"', block = true, for = "unix" }]

[manager]
linemode = "git"
